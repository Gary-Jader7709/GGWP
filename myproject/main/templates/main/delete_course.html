<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>刪除課程</title>
    <style>
      body {
        font-family: "Microsoft JhengHei", sans-serif;
        background: #f7f8fb;
        margin: 0;
        color: #1f2937;
      }

      .container {
        max-width: 650px;
        margin: 50px auto;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 32px;
        border-radius: 20px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
        color: #dc2626;
      }

      p {
        color: #4b5563;
        line-height: 1.8;
      }

      .btn {
        padding: 12px 22px;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        margin-top: 12px;
        margin-right: 10px;
      }

      .btn-danger {
        background: #dc2626;
        color: white;
      }

      .btn-dark {
        background: #1f2937;
        color: white;
      }
    </style>
  </head>
  <body>
    {% include 'main/partials/navbar.html' %}

    <div class="container">
      <div class="card">
        <h1>刪除課程</h1>
        <p>你確定要刪除這門課程嗎？</p>
        <p><strong>{{ course.title }}</strong></p>
        <p>刪除後無法復原。</p>

        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">確認刪除</button>
          <a href="{% url 'teacher_dashboard' %}" class="btn btn-dark">取消</a>
        </form>
      </div>
    </div>
  </body>
</html>
