<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>編輯課程</title>
    <style>
      body {
        font-family: "Microsoft JhengHei", sans-serif;
        background: #f7f8fb;
        margin: 0;
        color: #1f2937;
      }

      .container {
        max-width: 650px;
        margin: 50px auto;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 32px;
        border-radius: 20px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      form p {
        margin-bottom: 16px;
      }

      label {
        font-weight: bold;
        display: block;
        margin-bottom: 8px;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 16px;
      }

      .btn {
        background: #2563eb;
        color: white;
        padding: 12px 22px;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        margin-top: 12px;
      }

      .btn-dark {
        background: #1f2937;
      }
    </style>
  </head>
  <body>
    {% include 'main/partials/navbar.html' %}

    <div class="container">
      <div class="card">
        <h1>編輯課程</h1>
        <p>正在編輯：<strong>{{ course.title }}</strong></p>

        <form method="post" enctype="multipart/form-data">
          {% csrf_token %} {{ form.as_p }}
          <button type="submit" class="btn">儲存修改</button>
        </form>

        <a href="{% url 'teacher_dashboard' %}" class="btn btn-dark"
          >回教師專區</a
        >
      </div>
    </div>
  </body>
</html>
