<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>忘記密碼</title>
    <style>
      body {
        font-family: "Microsoft JhengHei", sans-serif;
        background: #f7f8fb;
        margin: 0;
        color: #1f2937;
      }

      .container {
        max-width: 520px;
        margin: 60px auto;
        padding: 20px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 20px;
        font-size: 32px;
      }

      p {
        color: #6b7280;
        line-height: 1.8;
        margin-bottom: 20px;
      }

      input[type="email"] {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 16px;
        margin-bottom: 16px;
      }

      .btn {
        width: 100%;
        border: none;
        background: #2563eb;
        color: white;
        padding: 14px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      }

      .back {
        display: inline-block;
        margin-top: 18px;
        color: #2563eb;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>忘記密碼</h1>
        <p>請輸入你註冊時使用的 Gmail，我們會寄送重設密碼的連結給你。</p>

        <form method="post">
          {% csrf_token %} {{ form.as_p }}
          <button type="submit" class="btn">寄送重設連結</button>
        </form>

        <a href="{% url 'login' %}" class="back">回登入頁</a>
      </div>
    </div>
  </body>
</html>
