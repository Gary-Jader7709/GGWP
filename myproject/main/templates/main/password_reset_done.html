<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>已送出重設申請</title>
    <style>
      body {
        font-family: "Microsoft JhengHei", sans-serif;
        background: #f7f8fb;
        margin: 0;
        color: #1f2937;
      }

      .container {
        max-width: 520px;
        margin: 60px auto;
        padding: 20px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 20px;
        font-size: 30px;
      }

      p {
        color: #6b7280;
        line-height: 1.8;
      }

      .back {
        display: inline-block;
        margin-top: 18px;
        color: #2563eb;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>已送出申請</h1>
        <p>如果這個 Email 已經註冊，我們會寄送重設密碼連結給你。</p>
        <a href="{% url 'login' %}" class="back">回登入頁</a>
      </div>
    </div>
  </body>
</html>
