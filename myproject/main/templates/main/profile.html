<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的個人資料</title>
    <style>
      body {
        font-family: "Microsoft JhengHei", sans-serif;
        background: #f7f8fb;
        margin: 0;
        color: #1f2937;
      }

      .container {
        max-width: 900px;
        margin: 50px auto;
        padding: 20px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
        font-size: 34px;
        margin-bottom: 20px;
      }

      .info {
        font-size: 18px;
        margin-bottom: 14px;
        color: #374151;
      }

      .btn-group {
        margin-top: 28px;
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-block;
        background: #2563eb;
        color: white;
        padding: 12px 22px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: bold;
      }

      .btn-dark {
        background: #1f2937;
      }
    </style>
  </head>
  <body>
    {% include 'main/partials/navbar.html' %}
    <div class="container">
      <div class="card">
        <h1>我的個人資料</h1>

        <div class="info">
          <strong>帳號：</strong>{{ request.user.username }}
        </div>
        <div class="info"><strong>Email：</strong>{{ request.user.email }}</div>
        <div class="info">
          <strong>身分：</strong>{{ profile.get_role_display }}
        </div>

        <div class="btn-group">
          <a href="/" class="btn btn-dark">回首頁</a>
          <a href="{% url 'my_courses' %}" class="btn">我的課程</a>

          {% if profile.role == 'teacher' %}
          <a href="{% url 'teacher_dashboard' %}" class="btn">教師專區</a>
          {% endif %}
        </div>
      </div>
    </div>
  </body>
</html>
