<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>學生首頁</title>
    <style>
      body {
        font-family: "Microsoft JhengHei", sans-serif;
        background: #f7f8fb;
        margin: 0;
        color: #1f2937;
      }

      .container {
        max-width: 1000px;
        margin: 50px auto;
        padding: 20px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
        font-size: 34px;
      }

      p {
        color: #6b7280;
        line-height: 1.8;
      }

      .box-group {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-top: 28px;
      }

      .box {
        background: #eff6ff;
        border-radius: 16px;
        padding: 22px;
      }

      .box h3 {
        margin-top: 0;
        margin-bottom: 10px;
      }

      a.btn {
        display: inline-block;
        margin-top: 22px;
        background: #2563eb;
        color: white;
        padding: 12px 22px;
        border-radius: 12px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>學生首頁</h1>
        <p>
          歡迎，{{ request.user.username
          }}。你目前是學生身分，之後可以在這裡查看我的課程、學習紀錄與 Power BI
          學習分析。
        </p>

        <div class="box-group">
          <div class="box">
            <h3>我的課程</h3>
            <p>查看已購買課程與正在學習的內容。</p>
            <a href="{% url 'my_courses' %}" class="btn">前往我的課程</a>
          </div>
          <div class="box">
            <h3>學習紀錄</h3>
            <p>之後可顯示觀看時數、課程類型與學習進度。</p>
          </div>
          <div class="box">
            <h3>Power BI 分析</h3>
            <p>之後可視覺化顯示個人學習數據。</p>
          </div>
        </div>

        <a href="/" class="btn">回首頁</a>
      </div>
    </div>
  </body>
</html>
